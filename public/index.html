<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager — Docker Learning Project</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ---- Reset & Base ---- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-hover: #22263a;
      --border: #2a2e3d;
      --text: #e4e6ef;
      --text-muted: #8b8fa3;
      --accent: #6c63ff;
      --accent-glow: rgba(108, 99, 255, 0.25);
      --green: #10b981;
      --green-glow: rgba(16, 185, 129, 0.2);
      --red: #ef4444;
      --red-glow: rgba(239, 68, 68, 0.15);
      --radius: 12px;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
      background-image:
        radial-gradient(ellipse at 20% 0%, rgba(108, 99, 255, 0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 100%, rgba(16, 185, 129, 0.06) 0%, transparent 60%);
    }

    /* ---- Container ---- */
    .app {
      width: 100%;
      max-width: 580px;
    }

    /* ---- Header ---- */
    .header {
      text-align: center;
      margin-bottom: 32px;
    }
    .header h1 {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
    }
    .header p {
      font-size: 14px;
      color: var(--text-muted);
    }

    /* ---- Status Badge ---- */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 28px;
      font-size: 13px;
      color: var(--text-muted);
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--red);
      animation: pulse 2s infinite;
    }
    .status-dot.connected {
      background: var(--green);
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .status-label { font-weight: 500; }
    .status-env {
      padding: 2px 8px;
      border-radius: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* ---- Input Area ---- */
    .input-area {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }
    .input-area input {
      flex: 1;
      padding: 14px 16px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-area input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .input-area input::placeholder {
      color: var(--text-muted);
    }
    .btn-add {
      padding: 14px 22px;
      border-radius: var(--radius);
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s;
      white-space: nowrap;
    }
    .btn-add:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px var(--accent-glow);
    }
    .btn-add:active {
      transform: translateY(0);
    }

    /* ---- Task List ---- */
    .task-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      transition: background 0.15s, border-color 0.15s, transform 0.15s;
      animation: slideIn 0.25s ease-out;
    }
    .task-item:hover {
      background: var(--surface-hover);
      border-color: rgba(108, 99, 255, 0.3);
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Custom Checkbox */
    .task-check {
      appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 2px solid var(--border);
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      position: relative;
      transition: background 0.2s, border-color 0.2s;
    }
    .task-check:checked {
      background: var(--green);
      border-color: var(--green);
    }
    .task-check:checked::after {
      content: '✓';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
    }

    .task-title {
      flex: 1;
      font-size: 15px;
      font-weight: 500;
      transition: opacity 0.2s;
    }
    .task-title.done {
      text-decoration: line-through;
      opacity: 0.45;
    }

    .task-date {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .btn-delete {
      padding: 6px 10px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-size: 16px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      opacity: 0;
    }
    .task-item:hover .btn-delete {
      opacity: 1;
    }
    .btn-delete:hover {
      background: var(--red-glow);
      color: var(--red);
    }

    /* ---- Empty State ---- */
    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-muted);
    }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    /* ---- Footer ---- */
    .footer {
      text-align: center;
      margin-top: 36px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.8;
    }
    .footer code {
      padding: 2px 6px;
      background: var(--surface);
      border-radius: 4px;
      font-size: 11px;
    }

    /* ---- Counter ---- */
    .counter {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      font-size: 13px;
      color: var(--text-muted);
    }
    .counter span {
      font-weight: 600;
      color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <div class="header">
      <h1>📋 Task Manager</h1>
      <p>Docker Learning Project — Phase 1: No Docker</p>
    </div>

    <!-- Status Bar -->
    <div class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <span class="status-label" id="statusLabel">Checking...</span>
      <span class="status-env" id="statusEnv">LOCAL</span>
    </div>

    <!-- Input -->
    <div class="input-area">
      <input type="text" id="taskInput" placeholder="What needs to be done?" autocomplete="off">
      <button class="btn-add" id="addBtn" onclick="addTask()">Add Task</button>
    </div>

    <!-- Counter -->
    <div class="counter">
      <div>Total: <span id="totalCount">0</span></div>
      <div>Completed: <span id="doneCount">0</span></div>
    </div>

    <!-- Task List -->
    <div class="task-list" id="taskList">
      <div class="empty-state" id="emptyState">
        <div class="icon">🎯</div>
        <p>No tasks yet. Add one above!</p>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      Running on <code>Node.js + Express + MongoDB</code><br>
      Phase 1: Everything installed locally — no Docker yet
    </div>
  </div>

  <script>
    const API = ''; // Same origin — no need to specify host
    const taskInput = document.getElementById('taskInput');
    const taskList = document.getElementById('taskList');
    const emptyState = document.getElementById('emptyState');
    const statusDot = document.getElementById('statusDot');
    const statusLabel = document.getElementById('statusLabel');
    const totalCount = document.getElementById('totalCount');
    const doneCount = document.getElementById('doneCount');

    // ---- Health Check ----
    async function checkHealth() {
      try {
        const res = await fetch('/health');
        const data = await res.json();
        statusDot.classList.toggle('connected', data.mongodb === 'connected');
        statusLabel.textContent = data.mongodb === 'connected' ? 'MongoDB Connected' : 'MongoDB Disconnected';
      } catch {
        statusDot.classList.remove('connected');
        statusLabel.textContent = 'API Offline';
      }
    }

    // ---- Load Tasks ----
    async function loadTasks() {
      try {
        const res = await fetch('/tasks');
        const tasks = await res.json();
        renderTasks(tasks);
      } catch (err) {
        console.error('Failed to load tasks:', err);
      }
    }

    // ---- Render Tasks ----
    function renderTasks(tasks) {
      if (tasks.length === 0) {
        taskList.innerHTML = `
          <div class="empty-state">
            <div class="icon">🎯</div>
            <p>No tasks yet. Add one above!</p>
          </div>`;
        totalCount.textContent = '0';
        doneCount.textContent = '0';
        return;
      }

      totalCount.textContent = tasks.length;
      doneCount.textContent = tasks.filter(t => t.completed).length;

      taskList.innerHTML = tasks.map(task => `
        <div class="task-item" id="task-${task._id}">
          <input
            type="checkbox"
            class="task-check"
            ${task.completed ? 'checked' : ''}
            onchange="toggleTask('${task._id}', this.checked)"
          >
          <span class="task-title ${task.completed ? 'done' : ''}">${escapeHtml(task.title)}</span>
          <span class="task-date">${formatDate(task.createdAt)}</span>
          <button class="btn-delete" onclick="deleteTask('${task._id}')" title="Delete task">✕</button>
        </div>
      `).join('');
    }

    // ---- Add Task ----
    async function addTask() {
      const title = taskInput.value.trim();
      if (!title) return;

      try {
        await fetch('/tasks', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title }),
        });
        taskInput.value = '';
        loadTasks();
      } catch (err) {
        console.error('Failed to add task:', err);
      }
    }

    // ---- Toggle Task ----
    async function toggleTask(id, completed) {
      try {
        await fetch(`/tasks/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ completed }),
        });
        loadTasks();
      } catch (err) {
        console.error('Failed to toggle task:', err);
      }
    }

    // ---- Delete Task ----
    async function deleteTask(id) {
      try {
        await fetch(`/tasks/${id}`, { method: 'DELETE' });
        loadTasks();
      } catch (err) {
        console.error('Failed to delete task:', err);
      }
    }

    // ---- Helpers ----
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function formatDate(dateStr) {
      return new Date(dateStr).toLocaleDateString('en-US', {
        month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
      });
    }

    // Enter key to add
    taskInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addTask();
    });

    // ---- Init ----
    checkHealth();
    loadTasks();
    setInterval(checkHealth, 10000); // Re-check every 10s
  </script>
</body>
</html>
