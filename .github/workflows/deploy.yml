name: Build and Push Docker Image
# First run
# This pipeline runs every time you push code to the 'main' branch
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Get the code from the repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Login to Docker Hub
      # It uses secrets configured in the GitHub repository settings
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 3: Build the Docker image and push it to Docker Hub
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # We use the 'latest' tag, and also tag it with the git commit hash for versioning.
          # The image name will be: YOUR_USERNAME/docker-sandbox:latest
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/docker-sandbox:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/docker-sandbox:${{ github.sha }}
